<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div>
        <div id="display">2131470</div>
        <div id="btns">
            <div id="calc">
                <div id="digits">
                    <div id="row1">
                        <button>1</button>
                        <button>2</button>
                        <button>3</button>
                    </div>
                    <div id="row2">
                        <button>4</button>
                        <button>5</button>
                        <button>6</button>
                    </div>
                    <div id="row3">
                        <button>7</button>
                        <button>8</button>
                        <button>9</button>
                    </div>
                    <button id="zero">0</button>
                </div>
                <div id="operations">
                    <button>+</button>
                    <button>-</button>
                    <button>*</button>
                    <button>/</button>
                    <button id="equals">=</button>
                </div>
            </div>
            <button id="clear">Clear</button>
        </div>
    </div>


    <script src="js.js"></script>
</body>
</html>
